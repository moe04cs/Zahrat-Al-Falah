<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zahrat Al Falah Contracting Co. | شركة زهرة الفلاح للمقاولات</title>

    <script>
      // Check the browser's language
      var userLang = navigator.language || navigator.userLanguage;

      // Redirect based on language priority (focusing on Arabic first)
      if (userLang.toLowerCase().startsWith("ar")) {
        // Removed the first slash, and explicitly named the file
        window.location.replace("ar/index.html");
      } else {
        // Removed the first slash, and explicitly named the file
        window.location.replace("en/index.html");
      }
    </script>
  </head>
  <body>
    <div style="font-family: sans-serif; text-align: center; padding-top: 50px">
      <p>Redirecting... / جاري التحويل...</p>
      <a
        href="en/index.html"
        style="margin-right: 20px; font-weight: bold; color: #c5a059"
        >English</a
      >
      <a href="ar/index.html" style="font-weight: bold; color: #c5a059"
        >العربية</a
      >
    </div>
  </body>
</html>
